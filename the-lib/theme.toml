attribute               = "dharma_gold"
keyword                 = "sacred_white"
"keyword.directive"     = "wheel_spoke"
namespace               = "wheel_spoke"
operator                = "dharma_gold"
punctuation             = "ash_veil"
"punctuation.delimiter" = "ash_veil"
special                 = "ritual_amber"
variable                = "pale_stone"
"variable.other.member" = "ivory"

comment                     = "temple_shadow"
constant                    = "ivory"
"constant.builtin"          = "ivory"
"constant.character.escape" = "ritual_amber"
"constant.numeric"          = "ochre_rune"
constructor                 = "wheel_spoke"
function                    = "sacred_white"
"function.builtin"          = "sacred_white"
"function.macro"            = "dharma_gold"
string                      = "bone_dust"
tag                         = "sacred_white"
type                        = "sacred_white"
"type.builtin"              = "sacred_white"
"variable.builtin"          = "cursed_green"
"variable.parameter"        = { fg = "pale_stone" }

label   = "ritual_amber"
tabstop = { bg = "void_deep", modifiers = [ "italic" ] }

"markup.bold"          = { modifiers = [ "bold" ] }
"markup.heading"       = "dharma_gold"
"markup.italic"        = { modifiers = [ "italic" ] }
"markup.link.text"     = "sacred_white"
"markup.link.url"      = { fg = "bone_dust", modifiers = [ "underlined" ] }
"markup.raw"           = "sacred_white"
"markup.strikethrough" = { modifiers = [ "crossed_out" ] }

"diff.delta" = "#c8922a"
"diff.minus" = "#c0392b"
"diff.plus"  = "#4a9e6b"

# --- UI Elements ---

"ui.background"           = { bg = "abyss" }
"ui.background.separator" = { fg = "iron_veil" }
"ui.help"                 = { bg = "dharma_gold", fg = "abyss" }
"ui.linenr"               = { fg = "iron_veil" }
"ui.linenr.selected"      = { fg = "dharma_gold" }
"ui.popup"                = { bg = "obsidian" }
"ui.popup.border"         = { fg = "iron_veil" }
"ui.statusline"           = { bg = "obsidian", fg = "dharma_gold" }
"ui.statusline.inactive"  = { bg = "obsidian", fg = "ash_veil" }
"ui.text"                 = { fg = "pale_stone" }
"ui.text.directory"       = { fg = "dharma_gold" }
"ui.text.focus"           = { fg = "ivory" }
"ui.text.inactive"        = "temple_shadow"
"ui.virtual"              = { fg = "iron_veil" }
"ui.virtual.inline"       = { fg = "iron_veil" }
"ui.virtual.overlay"      = { fg = "bone_dust" }
"ui.virtual.line"         = { fg = "bone_dust" }
"ui.virtual.gutter"       = { fg = "ritual_amber" }
"ui.virtual.jump-label"   = { fg = "ritual_amber", modifiers = [ "bold" ] }
"ui.virtual.ruler"        = { bg = "void_deep" }
"ui.window"               = { fg = "void_deep" }
"ui.buffer_tabs"          = { bg = "obsidian", fg = "iron_veil" }
"ui.buffer_tabs.tab.inactive" = { fg = "ash_veil" }
"ui.buffer_tabs.tab.active"   = { bg = "void_deep", fg = "ivory" }
"ui.buffer_tabs.tab.hovered"  = { bg = "#1e1a12" }
"ui.buffer_tabs.tab.modified" = { fg = "ritual_amber" }

"ui.virtual.indent-guide" = { fg = "iron_veil" }

"ui.selection"         = { bg = "#3d2e0a" }
"ui.selection.active"  = { bg = "#5a420d" }
"ui.selection.match"   = { bg = "#2e2208" }
"ui.cursor"                = { modifiers = [ "reversed" ] }
"ui.cursor.insert"         = { bg = "ivory" }
"ui.cursor.match"          = { bg = "#7a6030", fg = "#0d0b07" }
"ui.cursor.active.insert"  = { bg = "ivory" }
"ui.cursor.active.select"  = { bg = "dharma_gold" }
"ui.cursor.select"         = { bg = "dharma_gold" }
"ui.cursorline.active"     = { bg = "void_deep" }
"ui.debug"                 = { fg = "#5a3a2a" }
"ui.debug.breakpoint"      = { fg = "ritual_amber" }
"ui.highlight"             = { bg = "void_deep" }
"ui.highlight.frameline"   = { bg = "#5a3a2a" }
"ui.menu"                  = { bg = "obsidian", fg = "pale_stone" }
"ui.menu.scroll"           = { bg = "iron_veil", fg = "pale_stone" }
"ui.menu.selected"         = { bg = "dharma_gold", fg = "abyss" }

"ui.command_palette"               = { bg = "obsidian", fg = "pale_stone" }
"ui.command_palette.list.selected" = { bg = "dharma_gold", fg = "abyss" }
"ui.file_picker"                   = { bg = "obsidian", fg = "pale_stone" }
"ui.file_picker.list.selected"     = { bg = "dharma_gold", fg = "abyss" }
"ui.search_prompt"                 = { bg = "obsidian", fg = "pale_stone" }
"ui.search_prompt.list.selected"   = { bg = "dharma_gold", fg = "abyss" }
"ui.search_prompt.panel.border"    = { fg = "iron_veil" }

"ui.message_error"   = { bg = "obsidian", fg = "blood_curse" }
"ui.message_info"    = { bg = "obsidian", fg = "pale_stone" }
"ui.message_warning" = { bg = "obsidian", fg = "ritual_amber" }

# --- Diagnostics ---

"diagnostic.deprecated"  = { modifiers = [ "crossed_out" ] }
"diagnostic.error"       = { underline = { color = "blood_curse", style = "curl" } }
"diagnostic.hint"        = { underline = { color = "bone_dust", style = "curl" } }
"diagnostic.info"        = { underline = { color = "dharma_gold", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = [ "dim" ] }
"diagnostic.warning"     = { underline = { color = "ritual_amber", style = "curl" } }

error   = "blood_curse"
hint    = "bone_dust"
info    = "dharma_gold"
warning = "ritual_amber"

# --- Palette ---
# Built from Mahoraga's divine aesthetic:
# deep void blacks, ancient stone greys, sacred gold, ritual amber

[palette]
# Backgrounds — the void between worlds
abyss      = "#0a0905"   # deepest background, the boundless dark
obsidian   = "#111009"   # panels, popups, statusline
void_deep  = "#1a1710"   # cursorline, active tab bg, ruler

# Structural — ancient iron and shadow
iron_veil     = "#3d3928"   # line numbers, borders, virtual text
temple_shadow = "#5c5440"   # comments, inactive text
ash_veil      = "#8a8060"   # punctuation, inactive tabs

# Foregrounds — bone and sacred ivory
pale_stone = "#c8b99a"   # primary text, variables
bone_dust  = "#e0cdb0"   # strings
ivory      = "#f5eed8"   # constants, focused text, sacred_white alias
sacred_white = "#f5eed8"

# Gold — the divine wheel, Mahoraga's mark
dharma_gold  = "#c8922a"   # keywords, operators, headings, UI accent
ritual_amber = "#e8a030"   # special tokens, labels, modified tabs
ochre_rune   = "#d4a445"   # numeric constants

# Accent — spoke and adaptation
wheel_spoke  = "#b8a070"   # directives, namespaces, constructors, macro

# Life / curse contrast
cursed_green = "#5a9e6f"   # variable.builtin — the cursed technique
blood_curse  = "#c0392b"   # errors — the price of power

# --- Ghostty Terminal ---

[ghostty]
background   = "#0a0905"
foreground   = "#c8b99a"
cursor-color = "#c8922a"
cursor-text  = "#0a0905"
selection-background = "#3d2e0a"
selection-foreground = "#f5eed8"

[ghostty.palette]
"0"  = "#1a1710"
"1"  = "#c0392b"
"2"  = "#4a9e6b"
"3"  = "#c8922a"
"4"  = "#7a6840"
"5"  = "#9a7850"
"6"  = "#8a9060"
"7"  = "#c8b99a"
"8"  = "#3d3928"
"9"  = "#d44a3a"
"10" = "#5aae7b"
"11" = "#e8a030"
"12" = "#9a8050"
"13" = "#b09060"
"14" = "#a0a870"
"15" = "#f5eed8"
